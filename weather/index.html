<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Weather App | Modern</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Animated background elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div class="app">

        <!-- LEFT -->
        <div class="left">
            <div class="search">
                <div class="input-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="city" placeholder="Search for a city..." list="cities">
                </div>
                <datalist id="cities">
                    <option value="Jaipur">
                    <option value="Delhi">
                    <option value="Mumbai">
                    <option value="London">
                    <option value="New York">
                </datalist>
                <button onclick="getWeather()">Search</button>
            </div>

            <div class="main-weather fade-in" id="mainWeather">
                <i class="fa-solid fa-cloud-sun weather-icon"></i>
                <h1>--°</h1>
                <p>Enter a city to get weather</p>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right">

            <div class="box fade-in slide-up delay-1">
                <div class="box-header">
                    <i class="fa-solid fa-clock"></i>
                    <h3>HOURLY FORECAST</h3>
                </div>
                <div class="row" id="hourly">
                    <!-- Placeholder -->
                    <div class="hourly-item empty">
                        <p>--</p>
                    </div>
                </div>
            </div>

            <div class="box fade-in slide-up delay-2">
                <div class="box-header">
                    <i class="fa-solid fa-circle-info"></i>
                    <h3>WEATHER DETAILS</h3>
                </div>
                <div id="details">
                    <!-- Placeholders -->
                    <div class="detail-card">
                        <i class="fa-solid fa-droplet"></i>
                        <span>Humidity</span>
                        <strong>--%</strong>
                    </div>
                    <div class="detail-card">
                        <i class="fa-solid fa-wind"></i>
                        <span>Wind</span>
                        <strong>-- km/h</strong>
                    </div>
                    <div class="detail-card">
                        <i class="fa-solid fa-temperature-half"></i>
                        <span>Feels Like</span>
                        <strong>--°C</strong>
                    </div>
                    <div class="detail-card">
                        <i class="fa-solid fa-arrows-up-down"></i>
                        <span>Pressure</span>
                        <strong>-- hPa</strong>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
